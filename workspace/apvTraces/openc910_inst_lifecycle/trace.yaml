fsdbFile: /home/c910/lingzichao/openc910/smart_run/work_force/novas.fsdb
globalClock: tb.clk
scope: tb.x_soc.x_cpu_sub_system_axi.x_rv_integration_platform.x_cpu_top.x_ct_top_0.x_ct_core

output:
  directory: workspace/apvTraces/openc910_inst_lifecycle/report
  verbose: true
  timeout: 100000000
  dependency_graph: deps.png

globalFlush:
  condition:
    - "rtu_yy_xx_flush"
    - "|| x_ct_ifu_top.rtu_ifu_flush"
    - "|| x_ct_idu_top.rtu_idu_flush_fe"
    - "|| x_ct_idu_top.rtu_idu_flush_is"

tasks:
  - id: ifu_ib_inst0
    name: "IFU dispatch inst0"
    matchMode: first
    maxMatch: 1
    condition:
      - "x_ct_ifu_top.ifu_idu_ib_inst0_vld"
      - "&& not x_ct_idu_top.idu_ifu_id_stall"
      - "&& x_ct_ifu_top.ifdp_ipdp_vpc"
    capture:
      - x_ct_ifu_top.ifu_idu_ib_inst0_data
      - x_ct_ifu_top.ifu_idu_ib_inst1_data
      - x_ct_ifu_top.ifu_idu_ib_inst2_data
      - x_ct_ifu_top.pcgen_ifctrl_pc
      - x_ct_ifu_top.ifdp_ipdp_vpc
    logging:
      - "[IFU0] pc={pcgen_ifctrl_pc:x} inst0={ifu_idu_ib_inst0_data:x}"

  - id: ifu_ib_inst1
    name: "IFU dispatch inst1"
    matchMode: first
    maxMatch: 1
    condition:
      - "x_ct_ifu_top.ifu_idu_ib_inst1_vld"
      - "&& not x_ct_idu_top.idu_ifu_id_stall"
      - "&& x_ct_ifu_top.ifdp_ipdp_vpc"
    capture:
      - x_ct_ifu_top.ifu_idu_ib_inst0_data
      - x_ct_ifu_top.ifu_idu_ib_inst1_data
      - x_ct_ifu_top.ifu_idu_ib_inst2_data
      - x_ct_ifu_top.pcgen_ifctrl_pc
      - x_ct_ifu_top.ifdp_ipdp_vpc
    logging:
      - "[IFU1] pc={pcgen_ifctrl_pc:x} inst1={ifu_idu_ib_inst1_data:x}"

  - id: ifu_ib_inst2
    name: "IFU dispatch inst2"
    matchMode: first
    maxMatch: 1
    condition:
      - "x_ct_ifu_top.ifu_idu_ib_inst2_vld"
      - "&& not x_ct_idu_top.idu_ifu_id_stall"
      - "&& x_ct_ifu_top.ifdp_ipdp_vpc"
    capture:
      - x_ct_ifu_top.ifu_idu_ib_inst0_data
      - x_ct_ifu_top.ifu_idu_ib_inst1_data
      - x_ct_ifu_top.ifu_idu_ib_inst2_data
      - x_ct_ifu_top.pcgen_ifctrl_pc
      - x_ct_ifu_top.ifdp_ipdp_vpc
    logging:
      - "[IFU2] pc={pcgen_ifctrl_pc:x} inst2={ifu_idu_ib_inst2_data:x}"

  - id: id_decode_inst0
    name: "IDU ID decode inst0"
    dependsOn: ifu_ib_inst0
    matchMode: first
    maxMatch: 1
    condition:
      - "(x_ct_idu_top.x_ct_idu_id_dp.id_inst0_data[31:0] == $dep.ifu_ib_inst0.ifu_idu_ib_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_id_dp.id_inst1_data[31:0] == $dep.ifu_ib_inst0.ifu_idu_ib_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_id_dp.id_inst2_data[31:0] == $dep.ifu_ib_inst0.ifu_idu_ib_inst0_data[31:0])"
    capture:
      - x_ct_idu_top.x_ct_idu_id_dp.id_inst0_data
      - x_ct_idu_top.x_ct_idu_id_dp.id_inst1_data
      - x_ct_idu_top.x_ct_idu_id_dp.id_inst2_data
      - x_ct_idu_top.x_ct_idu_id_ctrl.id_inst0_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.id_inst1_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.id_inst2_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.ctrl_id_pipedown_inst0_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.ctrl_id_pipedown_inst1_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.ctrl_id_pipedown_inst2_vld
    logging:
      - "[DEC0] id0={id_inst0_data:x} id1={id_inst1_data:x} id2={id_inst2_data:x}"

  - id: id_decode_inst1
    name: "IDU ID decode inst1"
    dependsOn: ifu_ib_inst1
    matchMode: first
    maxMatch: 1
    condition:
      - "(x_ct_idu_top.x_ct_idu_id_dp.id_inst0_data[31:0] == $dep.ifu_ib_inst1.ifu_idu_ib_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_id_dp.id_inst1_data[31:0] == $dep.ifu_ib_inst1.ifu_idu_ib_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_id_dp.id_inst2_data[31:0] == $dep.ifu_ib_inst1.ifu_idu_ib_inst1_data[31:0])"
    capture:
      - x_ct_idu_top.x_ct_idu_id_dp.id_inst0_data
      - x_ct_idu_top.x_ct_idu_id_dp.id_inst1_data
      - x_ct_idu_top.x_ct_idu_id_dp.id_inst2_data
      - x_ct_idu_top.x_ct_idu_id_ctrl.id_inst0_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.id_inst1_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.id_inst2_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.ctrl_id_pipedown_inst0_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.ctrl_id_pipedown_inst1_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.ctrl_id_pipedown_inst2_vld
    logging:
      - "[DEC1] id0={id_inst0_data:x} id1={id_inst1_data:x} id2={id_inst2_data:x}"

  - id: id_decode_inst2
    name: "IDU ID decode inst2"
    dependsOn: ifu_ib_inst2
    matchMode: first
    maxMatch: 1
    condition:
      - "(x_ct_idu_top.x_ct_idu_id_dp.id_inst0_data[31:0] == $dep.ifu_ib_inst2.ifu_idu_ib_inst2_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_id_dp.id_inst1_data[31:0] == $dep.ifu_ib_inst2.ifu_idu_ib_inst2_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_id_dp.id_inst2_data[31:0] == $dep.ifu_ib_inst2.ifu_idu_ib_inst2_data[31:0])"
    capture:
      - x_ct_idu_top.x_ct_idu_id_dp.id_inst0_data
      - x_ct_idu_top.x_ct_idu_id_dp.id_inst1_data
      - x_ct_idu_top.x_ct_idu_id_dp.id_inst2_data
      - x_ct_idu_top.x_ct_idu_id_ctrl.id_inst0_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.id_inst1_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.id_inst2_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.ctrl_id_pipedown_inst0_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.ctrl_id_pipedown_inst1_vld
      - x_ct_idu_top.x_ct_idu_id_ctrl.ctrl_id_pipedown_inst2_vld
    logging:
      - "[DEC2] id0={id_inst0_data:x} id1={id_inst1_data:x} id2={id_inst2_data:x}"

  - id: ir_rename_inst0
    name: "IDU IR rename inst0"
    dependsOn: id_decode_inst0
    matchMode: first
    maxMatch: 1
    condition:
      - "(x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data[31:0] == $dep.id_decode_inst0.id_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data[31:0] == $dep.id_decode_inst0.id_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data[31:0] == $dep.id_decode_inst0.id_inst2_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data[31:0] == $dep.id_decode_inst0.id_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data[31:0] == $dep.id_decode_inst0.id_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data[31:0] == $dep.id_decode_inst0.id_inst2_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data[31:0] == $dep.id_decode_inst0.id_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data[31:0] == $dep.id_decode_inst0.id_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data[31:0] == $dep.id_decode_inst0.id_inst2_data[31:0])"
    capture:
      - x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data
      - x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data
      - x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ir_inst0_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ir_inst1_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ir_inst2_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ctrl_ir_pipedown_inst0_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ctrl_ir_pipedown_inst1_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ctrl_ir_pipedown_inst2_vld
      - rtu_idu_rob_inst0_iid
      - rtu_idu_rob_inst1_iid
      - rtu_idu_rob_inst2_iid
      - rtu_idu_rob_inst3_iid
    logging:
      - "[IR0] ir0={ir_inst0_data:x} ir1={ir_inst1_data:x} ir2={ir_inst2_data:x}"

  - id: ir_rename_inst1
    name: "IDU IR rename inst1"
    dependsOn: id_decode_inst1
    matchMode: first
    maxMatch: 1
    condition:
      - "(x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data[31:0] == $dep.id_decode_inst1.id_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data[31:0] == $dep.id_decode_inst1.id_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data[31:0] == $dep.id_decode_inst1.id_inst2_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data[31:0] == $dep.id_decode_inst1.id_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data[31:0] == $dep.id_decode_inst1.id_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data[31:0] == $dep.id_decode_inst1.id_inst2_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data[31:0] == $dep.id_decode_inst1.id_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data[31:0] == $dep.id_decode_inst1.id_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data[31:0] == $dep.id_decode_inst1.id_inst2_data[31:0])"
    capture:
      - x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data
      - x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data
      - x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ir_inst0_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ir_inst1_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ir_inst2_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ctrl_ir_pipedown_inst0_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ctrl_ir_pipedown_inst1_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ctrl_ir_pipedown_inst2_vld
      - rtu_idu_rob_inst0_iid
      - rtu_idu_rob_inst1_iid
      - rtu_idu_rob_inst2_iid
      - rtu_idu_rob_inst3_iid
    logging:
      - "[IR1] ir0={ir_inst0_data:x} ir1={ir_inst1_data:x} ir2={ir_inst2_data:x}"

  - id: ir_rename_inst2
    name: "IDU IR rename inst2"
    dependsOn: id_decode_inst2
    matchMode: first
    maxMatch: 1
    condition:
      - "(x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data[31:0] == $dep.id_decode_inst2.id_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data[31:0] == $dep.id_decode_inst2.id_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data[31:0] == $dep.id_decode_inst2.id_inst2_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data[31:0] == $dep.id_decode_inst2.id_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data[31:0] == $dep.id_decode_inst2.id_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data[31:0] == $dep.id_decode_inst2.id_inst2_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data[31:0] == $dep.id_decode_inst2.id_inst0_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data[31:0] == $dep.id_decode_inst2.id_inst1_data[31:0])"
      - "|| (x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data[31:0] == $dep.id_decode_inst2.id_inst2_data[31:0])"
    capture:
      - x_ct_idu_top.x_ct_idu_ir_dp.ir_inst0_data
      - x_ct_idu_top.x_ct_idu_ir_dp.ir_inst1_data
      - x_ct_idu_top.x_ct_idu_ir_dp.ir_inst2_data
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ir_inst0_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ir_inst1_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ir_inst2_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ctrl_ir_pipedown_inst0_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ctrl_ir_pipedown_inst1_vld
      - x_ct_idu_top.x_ct_idu_ir_ctrl.ctrl_ir_pipedown_inst2_vld
      - rtu_idu_rob_inst0_iid
      - rtu_idu_rob_inst1_iid
      - rtu_idu_rob_inst2_iid
      - rtu_idu_rob_inst3_iid
    logging:
      - "[IR2] ir0={ir_inst0_data:x} ir1={ir_inst1_data:x} ir2={ir_inst2_data:x}"

  - id: rob_alloc_inst0
    name: "ROB alloc inst0"
    dependsOn: ir_rename_inst0
    matchMode: first
    maxMatch: 1
    condition:
      - "idu_rtu_rob_create0_en"
      - "|| idu_rtu_rob_create1_en"
      - "|| idu_rtu_rob_create2_en"
      - "|| idu_rtu_rob_create3_en"
    capture:
      - idu_rtu_rob_create0_en
      - idu_rtu_rob_create1_en
      - idu_rtu_rob_create2_en
      - idu_rtu_rob_create3_en
      - rtu_idu_rob_inst0_iid
      - rtu_idu_rob_inst1_iid
      - rtu_idu_rob_inst2_iid
      - rtu_idu_rob_inst3_iid
    logging:
      - "[ROB0] iid0={rtu_idu_rob_inst0_iid:x} iid1={rtu_idu_rob_inst1_iid:x} iid2={rtu_idu_rob_inst2_iid:x} iid3={rtu_idu_rob_inst3_iid:x}"

  - id: rob_alloc_inst1
    name: "ROB alloc inst1"
    dependsOn: ir_rename_inst1
    matchMode: first
    maxMatch: 1
    condition:
      - "idu_rtu_rob_create0_en"
      - "|| idu_rtu_rob_create1_en"
      - "|| idu_rtu_rob_create2_en"
      - "|| idu_rtu_rob_create3_en"
    capture:
      - idu_rtu_rob_create0_en
      - idu_rtu_rob_create1_en
      - idu_rtu_rob_create2_en
      - idu_rtu_rob_create3_en
      - rtu_idu_rob_inst0_iid
      - rtu_idu_rob_inst1_iid
      - rtu_idu_rob_inst2_iid
      - rtu_idu_rob_inst3_iid
    logging:
      - "[ROB1] iid0={rtu_idu_rob_inst0_iid:x} iid1={rtu_idu_rob_inst1_iid:x} iid2={rtu_idu_rob_inst2_iid:x} iid3={rtu_idu_rob_inst3_iid:x}"

  - id: rob_alloc_inst2
    name: "ROB alloc inst2"
    dependsOn: ir_rename_inst2
    matchMode: first
    maxMatch: 1
    condition:
      - "idu_rtu_rob_create0_en"
      - "|| idu_rtu_rob_create1_en"
      - "|| idu_rtu_rob_create2_en"
      - "|| idu_rtu_rob_create3_en"
    capture:
      - idu_rtu_rob_create0_en
      - idu_rtu_rob_create1_en
      - idu_rtu_rob_create2_en
      - idu_rtu_rob_create3_en
      - rtu_idu_rob_inst0_iid
      - rtu_idu_rob_inst1_iid
      - rtu_idu_rob_inst2_iid
      - rtu_idu_rob_inst3_iid
    logging:
      - "[ROB2] iid0={rtu_idu_rob_inst0_iid:x} iid1={rtu_idu_rob_inst1_iid:x} iid2={rtu_idu_rob_inst2_iid:x} iid3={rtu_idu_rob_inst3_iid:x}"

  - id: is_aiq0_inst0
    name: "IS AIQ0 create inst0"
    dependsOn: rob_alloc_inst0
    matchMode: first
    maxMatch: 1
    condition:
      - "x_ct_idu_top.x_ct_idu_is_aiq0.ctrl_aiq0_create0_dp_en"
      - "&& x_ct_idu_top.x_ct_idu_is_aiq0.aiq0_xx_issue_en"
      - "&& x_ct_idu_top.x_ct_idu_is_aiq0.aiq0_bypass_en"
      - "&& x_ct_idu_top.x_ct_idu_is_aiq0.x_ct_idu_is_aiq0_entry0.x_create_dp_en"
      - "&& x_ct_idu_top.x_ct_idu_is_aiq0.x_ct_idu_is_aiq0_entry0.x_create_en == x_ct_idu_top.x_ct_idu_is_aiq0.aiq0_entry_create0_in"
      - "&& ((x_ct_idu_top.x_ct_idu_is_ctrl.is_dis_aiq0_create0_en && (x_ct_idu_top.x_ct_idu_is_dp.is_aiq0_create0_iid == $dep.rob_alloc_inst0.rtu_idu_rob_inst0_iid))"
      - "|| (x_ct_idu_top.x_ct_idu_is_ctrl.is_dis_aiq0_create1_en && (x_ct_idu_top.x_ct_idu_is_dp.is_aiq0_create1_iid == $dep.rob_alloc_inst0.rtu_idu_rob_inst0_iid))"
      - "|| (x_ct_idu_top.x_ct_idu_is_ctrl.is_dis_aiq1_create0_en && (x_ct_idu_top.x_ct_idu_is_dp.is_aiq1_create0_iid == $dep.rob_alloc_inst0.rtu_idu_rob_inst0_iid))"
      - "|| (x_ct_idu_top.x_ct_idu_is_ctrl.is_dis_aiq1_create1_en && (x_ct_idu_top.x_ct_idu_is_dp.is_aiq1_create1_iid == $dep.rob_alloc_inst0.rtu_idu_rob_inst0_iid)))"
    capture:
      - x_ct_idu_top.x_ct_idu_is_ctrl.is_dis_aiq0_create0_en
      - x_ct_idu_top.x_ct_idu_is_ctrl.is_dis_aiq0_create1_en
      - x_ct_idu_top.x_ct_idu_is_ctrl.is_dis_aiq1_create0_en
      - x_ct_idu_top.x_ct_idu_is_ctrl.is_dis_aiq1_create1_en
      - x_ct_idu_top.x_ct_idu_is_dp.is_aiq0_create0_iid
      - x_ct_idu_top.x_ct_idu_is_dp.is_aiq0_create1_iid
      - x_ct_idu_top.x_ct_idu_is_dp.is_aiq1_create0_iid
      - x_ct_idu_top.x_ct_idu_is_dp.is_aiq1_create1_iid
      - x_ct_idu_top.x_ct_idu_is_aiq0.ctrl_aiq0_create0_dp_en
