  objective: >
    Generate an address-family stress script contrasting valid, alias, and
    invalid address behaviors with explicit phase signatures.
  behavioral_requirements:
    - >
      Include reusable alias-window accesses and explicit invalid-window
      attempts.
    - >
      Keep at least one data template shared between valid and alias windows.
    - >
      Maintain stage-level markers for trace segmentation.
  completion_requirements:
    - >
      Include all three address-family categories and terminate cleanly with
      x10/a0=0 then M5EXIT##RISCV.
  retrieval_contract:
    example_style_anchor:
      - ex_rv64_rv64_invalid_address_force
    api_sensitive_traps:
      - >
        Requires combining address verification, page info, alias VA-for-PA
        mapping, and load-store target semantics.
manual_review_focus:
  - Did retrieval include invalid-address plus alias/verification materials?
  - Are valid-vs-alias-vs-invalid phases explicitly separated?
notes: >
  This case targets cold address-validation and aliasing details that require
  deliberate multi-source retrieval.