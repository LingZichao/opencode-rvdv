    - api_name_lists
    - retrieval_instructions
  note: >
    The generator-facing plan must describe the floating-point behavior only.
    Knowledge references stay in this manifest and the unit catalog.
expected_source_mix:
  example_min_hits: 2
  api_min_hits: 2
  nav_expected: true
  preferred_trace_shape:
    - nav_example_agents
    - ex_fsu_muldiv_data_constr_force
    - nav_api_index
    - api_um_5_1_1_genInstruction
    - api_um_5_12_14_genData
