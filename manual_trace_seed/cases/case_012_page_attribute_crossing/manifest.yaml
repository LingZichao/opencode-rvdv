test_plan:
  objective: >
    Generate a script that contrasts multiple page-attribute windows, includes
    page-crossing accesses, and exposes success-vs-restricted behavior.
  behavioral_requirements:
    - >
      Reuse comparable address templates across different page-attribute
      windows.
    - >
      Include both in-page and cross-page memory accesses.
    - >
      Include explicit stage signatures for window-level trace separation.
  completion_requirements:
    - >
      Include both successful and restricted access windows and terminate
      cleanly with x10/a0=0 then M5EXIT##RISCV.
  retrieval_contract:
    example_style_anchor:
      - ex_paging_paging_memory_attributes_basic_force
    api_sensitive_traps:
      - >
        Requires nuanced paging-choice and variable-modification semantics.
      - >
        Requires combining VA generation and VA-for-PA alias behavior.
manual_review_focus:
  - Did retrieval include memory-attribute examples plus paging-choice sections?
  - Are cross-page and restricted-window behaviors both observable?
notes: >
  This case targets page-attribute and crossing subtleties that are often
  under-specified in generic memory tests.