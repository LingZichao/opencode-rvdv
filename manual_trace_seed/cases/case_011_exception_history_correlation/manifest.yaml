  target_cluster_example_hit_required: true
  target_cluster_api_hit_required: true
  wrong_cluster_detour_budget: 2
test_plan:
  objective: >
    Generate a script that triggers multiple exception classes and validates
    their chronological and contextual correlation through post-trap checks.
  behavioral_requirements:
    - >
      Trigger repeated traps of at least one class from distinct trigger sites.
    - >
      Mix trap classes across different privilege contexts.
    - >
      Include explicit post-trap anchor blocks to prove return-path continuity.
  completion_requirements:
    - >
      Include at least five trap events and terminate cleanly.
    - >
      End with x10/a0 zero then M5EXIT##RISCV.
  retrieval_contract:
    example_style_anchor:
      - ex_exception_handlers_exception_counts_force
    api_sensitive_traps:
      - >
        Requires history-count and record-query semantics beyond single-trap
        generation.
      - >
        Requires cross-checking trap class and privilege-source dimensions.
manual_review_focus:
  - Did retrieval include both trap generation and trap-history query materials?
  - Are repeated same-class different-site traps clearly encoded?
notes: >
  This case stresses niche exception-history semantics that are usually missed
  by shallow search.