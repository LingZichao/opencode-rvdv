test_plan:
  objective: >
    Generate a multi-round syscall privilege-roundtrip script with explicit
    post-return state and path-consistency checks.
  behavioral_requirements:
    - >
      Trigger syscall-like traps in at least two different context settings.
    - >
      Return to deterministic anchor blocks after each round.
    - >
      Validate state continuity after returns.
  completion_requirements:
    - >
      Include at least four syscall triggers and terminate cleanly with
      x10/a0=0 then M5EXIT##RISCV.
  retrieval_contract:
    example_style_anchor:
      - ex_privilege_switch_system_call_sequence_force
    api_sensitive_traps:
      - >
        Requires tight coupling of syscall examples with privilege/state query
        APIs.
manual_review_focus:
  - Did retrieval combine syscall and privilege-state sources?
  - Are return anchors and post-return checks explicit?
notes: >
  This case targets rare syscall-roundtrip details beyond basic privilege
  switching.