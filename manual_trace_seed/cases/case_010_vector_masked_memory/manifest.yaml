retrieval_acceptance:
  target_cluster_hit_required: true
  target_cluster_example_hit_required: true
  target_cluster_api_hit_required: true
  wrong_cluster_detour_budget: 3
test_plan:
  objective: >
    Generate a high-complexity vector-memory script that couples mask control,
    indexed addressing, and address-attribute contrast in one coherent flow.
  behavioral_requirements:
    - >
      The script should perform vector memory operations under multiple vset
      configurations and multiple mask patterns.
    - >
      The script should replay at least one indexed memory template with only
      mask changes to isolate masking effects.
    - >
      The script should contrast a stable address window and a restricted
      address window while preserving comparable vector access shape.
    - >
      If restricted-window access raises exception-like behavior, execution
      should still proceed to a post-window marker block.
  completion_requirements:
    - >
      The sequence must contain vector load/store behavior across masked,
      indexed, and strided or unit-stride styles.
    - >
      The script must terminate cleanly with x10/a0 set to zero before
      M5EXIT##RISCV.
  retrieval_contract:
    example_style_anchor:
      - ex_vector_vector_mask_load_store_force
    api_sensitive_traps:
      - >
        Correct design requires combining vector operand/mask setup knowledge
        with memory target and address-attribute controls.
      - >
        A valid contrast requires keeping access template stable while changing
        one factor at a time (mask or address attribute).
      - >
        High-quality trace segmentation needs explicit stage markers across
        vector-configuration and memory-attribute transitions.
manual_review_focus:
  - >
    Did retrieval include both vector-memory examples and address-attribute
    references rather than only one domain?
  - >
    Are mask-only replay pairs and attribute-contrast windows explicit?
  - >
    Does the trajectory indicate substantial search effort for niche vector
    details?
notes: >
  This case intentionally targets sparse and detail-heavy knowledge paths so
  that successful generation depends on non-trivial document/example search.