    cluster_name: register/dependency
    source_type: apiDoc_section
    path: workspace/agentDoc/forceRV/apiDoc/FORCE-RISCV_User_Manual-v0.8.md
    anchor: "### 5.5.6 isRegisterReserved"
    line_start: 1253
    line_end: 1275
    title: isRegisterReserved
    summary: >
      Describes how to check reservation state for a specific access mode and
      how the default access differs from an explicit Read or Write query.
    keywords:
      - isRegisterReserved
      - reservation check
      - Read
      - Write
    role_hint: required_api
    required_for_case_ids:
      - case_001_register_dependency_reserved_window

  - unit_id: api_um_5_5_9_initialize_register
